<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17110d"/>
      <stop offset="0.45" stop-color="#2A2017"/>
      <stop offset="1" stop-color="#140F0B"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 260) rotate(18) scale(760 420)">
      <stop offset="0" stop-color="#F3D9A2" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F3D9A2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1480 820) rotate(-15) scale(860 420)">
      <stop offset="0" stop-color="#D5A65F" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#D5A65F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 180) rotate(0) scale(520 280)">
      <stop offset="0" stop-color="#FFF7E3" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFF7E3" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.87" numOctaves="2" seed="12" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2D7A0" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#F2D7A0" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#F2D7A0" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glowA)"/>
  <rect width="1920" height="1080" fill="url(#glowB)"/>
  <rect width="1920" height="1080" fill="url(#glowC)"/>

  <g opacity="0.5">
    <path d="M120 900C420 640 690 560 1100 620" stroke="url(#line)" stroke-width="1.4"/>
    <path d="M240 980C560 730 900 650 1440 760" stroke="url(#line)" stroke-width="1.1"/>
    <path d="M500 120C900 300 1220 260 1700 120" stroke="url(#line)" stroke-width="1.2"/>
  </g>

  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.34"/>
</svg>
