<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="../ikony/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../ikony/favicon-16x16.png" />
    <link rel="shortcut icon" href="../favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../ikony/favicon-180x180.png" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Potwierdzenie rezerwacji — Średzka Korona</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/booking-confirm.css" />
  </head>
  <body class="confirm-body">
    <div class="confirm-wrap">
      <div class="confirm-card" id="out">
        <div class="confirm-brand">
          <a href="../index.html" class="confirm-logo-link" aria-label="Średzka Korona — strona główna">
            <span class="confirm-logo-text">ŚREDZKA</span>
            <img
              class="confirm-logo-img"
              src="../ikony/logo-korona.png"
              alt=""
              width="48"
              height="48"
              decoding="async"
            />
            <span class="confirm-logo-text">KORONA</span>
          </a>
        </div>
        <p class="confirm-loading">Trwa potwierdzanie…</p>
      </div>
    </div>
    <script src="../assets/js/config.js"></script>
    <script>
      (function () {
        const BRAND =
          '<div class="confirm-brand">' +
          '<a href="../index.html" class="confirm-logo-link" aria-label="Średzka Korona — strona główna">' +
          '<span class="confirm-logo-text">ŚREDZKA</span>' +
          '<img class="confirm-logo-img" src="../ikony/logo-korona.png" alt="" width="48" height="48" decoding="async" />' +
          '<span class="confirm-logo-text">KORONA</span>' +
          "</a></div>";
        const CTA =
          '<div class="confirm-actions">' +
          '<a class="confirm-cta" href="../index.html">Wróć na stronę główną <span class="confirm-domain">sredzkakorona.pl</span></a>' +
          "</div>";
        const CONFIRM_ACTION =
          '<div class="confirm-action-stack">' +
          '<button type="button" class="confirm-cta confirm-cta-button" id="confirm-reservation">Potwierdź adres e-mail</button>' +
          "</div>";

        function hallApiBase() {
          const c = window.SREDZKA_CONFIG || {};
          if (c.apiBase) {
            return String(c.apiBase).replace(/\/$/, "") + "/api/public/legacy-bookings/hall";
          }
          if (c.hallApiBase) return String(c.hallApiBase).replace(/\/$/, "");
          if (c.firebaseProjectId) {
            return "https://europe-west1-" + c.firebaseProjectId + ".cloudfunctions.net/hallApi";
          }
          return "";
        }
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const out = document.querySelector("#out");
        if (!token) {
          out.innerHTML =
            BRAND +
            '<h1 class="confirm-err-title">Brak tokenu</h1>' +
            '<p class="confirm-err-text">Link jest niepełny lub nieprawidłowy. Skorzystaj z pełnego adresu z wiadomości e-mail.</p>' +
            CTA;
          return;
        }
        const base = hallApiBase();
        if (!base) {
          out.innerHTML =
            BRAND +
            '<h1 class="confirm-err-title">Konfiguracja</h1>' +
            '<p class="confirm-err-text">Brak konfiguracji API (plik <span class="confirm-highlight">config.js</span>).</p>' +
            CTA;
          return;
        }
        let confirming = false;

        function renderReadyState() {
          out.innerHTML =
            BRAND +
            '<p class="confirm-kicker">Potwierdzenie adresu e-mail</p>' +
            '<h1 class="confirm-title">Potwierdź zgłoszenie</h1>' +
            '<p class="confirm-lead">Kliknij przycisk poniżej, aby potwierdzić adres e-mail i przekazać rezerwację do dalszej obsługi przez obiekt.</p>' +
            '<div class="confirm-note"><strong>Uwaga:</strong> samo otwarcie tej strony nie potwierdza już rezerwacji.</div>' +
            CONFIRM_ACTION +
            CTA;

          const button = document.getElementById("confirm-reservation");
          button?.addEventListener("click", async () => {
            if (confirming) return;
            confirming = true;
            button.disabled = true;
            button.textContent = "Potwierdzanie...";
            try {
              const r = await fetch(base + "?op=public-reservation-confirm", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token }),
              });
              const d = await r.json().catch(() => ({}));
              if (!r.ok) {
                out.innerHTML =
                  BRAND +
                  '<h1 class="confirm-err-title">Nie udało się potwierdzić</h1>' +
                  "<p class=\"confirm-err-text\">" +
                  (d.error || "Spróbuj ponownie później albo skontaktuj się z obiektem.") +
                  "</p>" +
                  CTA;
                return;
              }
              out.innerHTML =
                BRAND +
                '<p class="confirm-kicker">Potwierdzenie adresu e-mail</p>' +
                '<h1 class="confirm-title">Zgłoszenie zostało potwierdzone</h1>' +
                '<p class="confirm-lead">Potwierdzili Państwo adres e-mail. Rezerwacja sali ma status <strong class="confirm-highlight">oczekujący</strong> na decyzję obiektu.</p>' +
                '<p class="confirm-text">Obsługa skontaktuje się telefonicznie, aby przedstawić wycenę i ustalić dalsze kroki. Wycena nie jest ustalana automatycznie w systemie rezerwacji online.</p>' +
                CTA;
            } catch {
              out.innerHTML =
                BRAND +
                '<h1 class="confirm-err-title">Błąd połączenia</h1>' +
                '<p class="confirm-err-text">Serwer nie odpowiedział. Sprawdź połączenie z internetem i spróbuj ponownie za chwilę.</p>' +
                CTA;
            } finally {
              confirming = false;
            }
          });
        }

        renderReadyState();
      })();
    </script>
  </body>
</html>
